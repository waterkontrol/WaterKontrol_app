<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WaterKontrol - Nueva Contraseña</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="auth-container">
    <h2>Nueva Contraseña</h2>
    <form id="resetForm">
      <label for="nuevaClave">Nueva Contraseña:</label>
      <input type="password" id="nuevaClave" name="nuevaClave" required>

      <button type="submit">Restablecer Contraseña</button>
      <p id="message" style="margin-top: 15px;"></p>
    </form>
    <div id="successState" class="links" style="display: none; text-align: center;">
      <p style="margin-bottom: 12px;">Ya puedes abrir tu aplicación e iniciar sesión.</p>
      <button id="openAppButton" type="button" style="margin-bottom: 12px;">Abrir Kontrol</button>
    </div>
    <div id="defaultLinks" class="links">
      <a href="/login.html">Volver al Login</a>
    </div>
  </div>

  <script>
    const appLoginUrl = 'io.ionic.starter://login';
    const successState = document.getElementById('successState');
    const defaultLinks = document.getElementById('defaultLinks');
    const resetForm = document.getElementById('resetForm');
    const openAppButton = document.getElementById('openAppButton');

    function openApp() {
      window.location.href = appLoginUrl;
    }

    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token');

    if (!token) {
      document.getElementById('message').textContent = 'Token inválido o faltante.';
      document.getElementById('message').style.color = 'red';
      resetForm.style.display = 'none';
    }

    openAppButton.addEventListener('click', openApp);

    resetForm.addEventListener('submit', async function (e) {
      e.preventDefault();
      const message = document.getElementById('message');
      message.textContent = 'Restableciendo...';
      message.style.color = 'blue';

      const data = { token, nuevaClave: document.getElementById('nuevaClave').value };

      try {
        const res = await fetch(`${RAILWAY_API_URL}/auth/reset`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });

        const result = await res.json();
        message.textContent = result.message;
        message.style.color = res.ok ? 'green' : 'red';

        if (res.ok) {
          resetForm.style.display = 'none';
          defaultLinks.style.display = 'none';
          successState.style.display = 'block';
        }
      } catch (err) {
        message.textContent = 'Error de red';
        message.style.color = 'red';
      }
    });
  </script>
  <script src="/variables.js"></script>
</body>
</html>
